<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STONE — Scroll Experience</title>
<meta name="description" content="חוויית גלילה קולנועית — רצף תמונות באיכות גבוהה.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b;
    --ink:#f4f1ea;
    --ink-dim:rgba(244,241,234,.55);
    --line:rgba(244,241,234,.22);
    --accent:#c9a96a;
    --pad:clamp(20px,3.2vw,46px);
    --frame:clamp(14px,2vw,28px);
  }
  @font-face{
    font-family:"Bradome";
    src:url("fonts/Bradome.woff2") format("woff2");
    font-weight:normal;font-style:normal;font-display:swap;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:"Montserrat","Helvetica Neue",Arial,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;cursor:default;user-select:none}

  /* ===== Stage / Canvas ===== */
  #stage{position:fixed;inset:0;background:#000;overflow:hidden}
  #seq{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* cinematic darkening so UI/title stay readable */
  #stage::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 42%, transparent 38%, rgba(0,0,0,.55) 100%),
      linear-gradient(180deg, rgba(0,0,0,.45) 0%, transparent 22%, transparent 70%, rgba(0,0,0,.6) 100%);
    z-index:2}

  /* ===== Decorative bounding frame ===== */
  .uiframe{position:fixed;inset:var(--frame);pointer-events:none;z-index:6}
  .corner{position:absolute;width:34px;height:34px;border:1.5px solid var(--line)}
  .corner.tl{top:0;left:0;border-right:0;border-bottom:0}
  .corner.tr{top:0;right:0;border-left:0;border-bottom:0}
  .corner.bl{bottom:0;left:0;border-right:0;border-top:0}
  .corner.br{bottom:0;right:0;border-left:0;border-top:0}
  .edge{position:absolute;background:var(--line)}
  .edge.top{top:0;left:50%;transform:translateX(-50%);width:1px;height:18px}
  .edge.bottom{bottom:0;left:50%;transform:translateX(-50%);width:1px;height:18px}

  /* ===== Top bar ===== */
  .topbar{position:fixed;top:var(--pad);left:var(--pad);right:var(--pad);
    display:flex;align-items:center;justify-content:space-between;z-index:8;
    color:#fff;text-shadow:0 1px 18px rgba(0,0,0,.5)}
  .logo{display:flex;align-items:center;gap:11px;letter-spacing:.42em;
    font-size:14px;font-weight:600;text-transform:uppercase;color:#fff}
  .logo .mark{height:30px;width:auto;display:block;fill:#fff}
  .navmeta{display:flex;gap:26px;font-size:11px;letter-spacing:.28em;
    text-transform:uppercase;color:#fff}
  .navmeta a{color:#fff;text-decoration:none;opacity:1;transition:opacity .3s}
  .navmeta a:hover{opacity:.6}

  /* ===== Centered titles ===== */
  #titles{position:fixed;inset:0;z-index:5;pointer-events:none}
  .title{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    opacity:0;transition:opacity .6s ease}
  .title.active{opacity:1}
  .title .kicker{font-size:clamp(10px,1vw,12px);letter-spacing:.55em;
    text-transform:uppercase;color:var(--accent);margin-bottom:clamp(14px,2vw,26px);
    transform:translateY(14px);transition:transform .9s cubic-bezier(.16,1,.3,1) .05s;opacity:.9}
  .title h1{font-family:"Bradome","Helvetica Neue",Arial,sans-serif;
    font-size:clamp(96px,21vw,360px);line-height:.94;font-weight:400;
    letter-spacing:.02em;text-transform:uppercase;
    transform:translateY(34px);transition:transform 1s cubic-bezier(.16,1,.3,1);
    text-shadow:0 12px 60px rgba(0,0,0,.5)}
  .title.active .kicker,.title.active h1{transform:translateY(0)}
  .title .rule{width:54px;height:1px;background:var(--accent);margin:clamp(20px,2.4vw,30px) 0 0;
    transform:scaleX(0);transition:transform .9s cubic-bezier(.16,1,.3,1) .2s}
  .title.active .rule{transform:scaleX(1)}

  /* ===== Right progress rail ===== */
  .rail{position:fixed;top:50%;right:var(--pad);transform:translateY(-50%);
    display:flex;flex-direction:column;gap:16px;z-index:8;align-items:center}
  .rail .dot{display:flex;align-items:center;gap:10px;cursor:pointer;
    font-size:10px;letter-spacing:.2em;color:var(--ink-dim);transition:color .35s}
  .rail .dot .bar{position:relative;width:34px;height:1.5px;background:var(--line);overflow:hidden}
  .rail .dot .bar i{position:absolute;inset:0;width:0%;background:var(--accent)}
  .rail .dot.on{color:var(--ink)}
  .rail .dot .num{opacity:0;transform:translateX(6px);transition:.35s}
  .rail .dot.on .num,.rail .dot:hover .num{opacity:1;transform:translateX(0)}

  /* ===== Bottom bar ===== */
  .bottombar{position:fixed;bottom:var(--pad);left:var(--pad);right:var(--pad);
    display:flex;align-items:flex-end;justify-content:space-between;z-index:8}
  .counter{display:flex;align-items:baseline;gap:6px;font-weight:600}
  .counter .cur{font-size:clamp(40px,5vw,68px);line-height:.8;letter-spacing:-.03em}
  .counter .tot{font-size:14px;color:var(--ink-dim);letter-spacing:.1em}
  .scrollhint{display:flex;align-items:center;gap:12px;font-size:11px;
    letter-spacing:.3em;text-transform:uppercase;color:#fff;
    text-shadow:0 1px 18px rgba(0,0,0,.5)}
  .scrollhint .mouse{width:20px;height:32px;border:1.5px solid rgba(255,255,255,.7);
    border-radius:11px;position:relative}
  .scrollhint .mouse::after{content:"";position:absolute;top:6px;left:50%;
    transform:translateX(-50%);width:2px;height:6px;background:var(--ink);border-radius:2px;
    animation:wheel 1.6s ease-in-out infinite}
  @keyframes wheel{0%{opacity:0;transform:translate(-50%,0)}30%{opacity:1}
    70%{opacity:1}100%{opacity:0;transform:translate(-50%,9px)}}

  /* ===== Loader ===== */
  #loader{position:fixed;inset:0;z-index:30;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
    transition:opacity .8s ease}
  #loader.hide{opacity:0;pointer-events:none}
  #loader .llogo{letter-spacing:.5em;font-size:13px;text-transform:uppercase;opacity:.85}
  #loader .lbar{width:min(260px,52vw);height:1.5px;background:var(--line);overflow:hidden}
  #loader .lbar i{display:block;height:100%;width:0%;background:var(--accent);transition:width .25s}
  #loader .lpct{font-size:11px;letter-spacing:.3em;color:var(--ink-dim)}

  /* ===== Blink (eyelid) transition for non-adjacent jumps ===== */
  #blink{position:fixed;inset:0;z-index:20;pointer-events:none}
  #blink .lid{position:absolute;left:0;right:0;height:62vh;
    transition:transform .55s cubic-bezier(.76,0,.24,1)}
  #blink .top{top:0;transform:translateY(-101%);
    background:linear-gradient(to bottom,#000 0%,#000 82%,transparent 100%)}
  #blink .bot{bottom:0;transform:translateY(101%);
    background:linear-gradient(to top,#000 0%,#000 82%,transparent 100%)}
  #blink.closed .lid{transform:translateY(0)}

  @media (max-width:680px){
    .navmeta,.scrollhint span{display:none}
    .rail{right:calc(var(--frame) + 8px)}
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="seq"></canvas>
  </div>

  <!-- decorative frame -->
  <div class="uiframe">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
    <span class="edge top"></span><span class="edge bottom"></span>
  </div>

  <!-- top bar -->
  <header class="topbar">
    <div class="logo"><svg class="mark" viewBox="0 0 581.8 773.4" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M317.6,732.8l224.3-221.7-37.2-294.8L319.4,40.6,54.8,297.5l-14.9,301.9,277.6,133.4ZM358.2,226.7l-23.3-142.1,136,129-112.7,13.1ZM337.4,230.3l-238.2,53.7,213.2-207,25.1,153.3ZM72.8,323.1l203.8,172,25.8,208.3-239.4-117.2,9.8-263.1ZM298.6,501.2l208.1,15-183.7,181.5-24.4-196.5ZM518.6,495.8l-227.9-16.4-202.8-171.2,263.3-59.4,134.3-15.6,33.2,262.6Z"/></svg><span>STONE</span></div>
    <nav class="navmeta">
      <a href="#">Studio</a><a href="#">Work</a><a href="#">Contact</a>
    </nav>
  </header>

  <!-- centered titles -->
  <div id="titles"></div>

  <!-- progress rail -->
  <div class="rail" id="rail"></div>

  <!-- bottom bar -->
  <footer class="bottombar">
    <div class="counter"><span class="cur" id="cur">01</span><span class="tot">/ 05</span></div>
    <div class="scrollhint"><span>Scroll</span><span class="mouse"></span></div>
  </footer>

  <!-- blink (eyelid) transition -->
  <div id="blink"><span class="lid top"></span><span class="lid bot"></span></div>

  <!-- loader -->
  <div id="loader">
    <div class="llogo">STONE</div>
    <div class="lbar"><i id="lbarfill"></i></div>
    <div class="lpct" id="lpct">0%</div>
  </div>

<script>
/* ============================================================
   CONFIG
============================================================ */
// 4 video clips. Each one plays during the scroll BETWEEN two sections:
// video[0] = section 1->2, video[1] = 2->3, video[2] = 3->4, video[3] = 4->5.
const VIDEOS = ['section1','section2','section3','section4'];

// 5 sections — one big title each. Section 5 has no clip of its own; it is
// where video 4 lands (rests on its final frame).
const SECTIONS = [
  { kicker:'Chapter 01', title:'ORIGIN'  },
  { kicker:'Chapter 02', title:'FORM'    },
  { kicker:'Chapter 03', title:'MOTION'  },
  { kicker:'Chapter 04', title:'ESSENCE' },
  { kicker:'Chapter 05', title:'SILENCE' },
];
const FRAMES = 145;                 // per clip
const PAD = 3;                       // zero-pad width => frame_001
const DURATION = 5000;              // 5s linear transition per requirement
const EXT = 'webp';
// Looping background clips, keyed by section index. While you rest on the section
// they loop continuously (without locking input). Used for section 4 and the end.
const LOOPS = {
  1: { folder:'loop2',  frames:145, duration:6000 },  // section 2
  3: { folder:'loop4',  frames:73,  duration:3200 },  // section 4
  4: { folder:'finale', frames:73,  duration:3200 },  // section 5 (the end)
};

/* ============================================================
   DOM
============================================================ */
const canvas = document.getElementById('seq');
const ctx = canvas.getContext('2d', { alpha:false });
const titlesEl = document.getElementById('titles');
const railEl = document.getElementById('rail');
const curEl = document.getElementById('cur');
const loader = document.getElementById('loader');
const lbarfill = document.getElementById('lbarfill');
const lpct = document.getElementById('lpct');
const blinkEl = document.getElementById('blink');

/* build titles + rail */
SECTIONS.forEach((s,i)=>{
  const t = document.createElement('div');
  t.className = 'title' + (i===0?' active':'');
  t.dataset.i = i;
  t.innerHTML = `<div class="kicker">${s.kicker}</div>
    <h1>${s.title}</h1><span class="rule"></span>`;
  titlesEl.appendChild(t);

  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' on':'');
  d.dataset.i = i;
  d.innerHTML = `<span class="num">0${i+1}</span><span class="bar"><i></i></span>`;
  d.addEventListener('click', ()=> goTo(i));
  railEl.appendChild(d);
});
const titleEls = [...titlesEl.children];
const dotEls = [...railEl.children];

/* ============================================================
   IMAGE PRELOAD
============================================================ */
const store = VIDEOS.map(()=> new Array(FRAMES).fill(null));
const loaded = VIDEOS.map(()=> 0);

function frameURL(vi, fi){
  return `frames/${VIDEOS[vi]}/frame_${String(fi+1).padStart(PAD,'0')}.${EXT}`;
}
function loadVideo(vi){
  return new Promise(resolve=>{
    let done = 0;
    for (let f=0; f<FRAMES; f++){
      const img = new Image();
      img.decoding = 'async';
      img.onload = img.onerror = ()=>{
        store[vi][f] = img; done++; loaded[vi]=done;
        if (done===FRAMES) resolve();
      };
      img.src = frameURL(vi,f);
    }
  });
}

// which video clip / frame a section rests on when idle (its "poster")
function restClip(s){ return Math.min(s, VIDEOS.length-1); }
function restFrame(s){ return s < VIDEOS.length ? 0 : FRAMES-1; }
function restImg(s){ return store[restClip(s)][restFrame(s)]; }

// Looping clips (separate from the section clips). Each loops continuously while
// you rest on its section, and does NOT lock input — navigating away cancels it.
Object.values(LOOPS).forEach(L=>{ L.store = new Array(L.frames).fill(null); L.loaded = 0; });
function loopReady(L){ return L.loaded >= L.frames; }
function loadLoop(L){
  return L._p || (L._p = new Promise(resolve=>{
    let done = 0;
    for (let f=0; f<L.frames; f++){
      const img = new Image(); img.decoding = 'async';
      img.onload = img.onerror = ()=>{ L.store[f]=img; done++; L.loaded=done; if (done===L.frames) resolve(); };
      img.src = `frames/${L.folder}/frame_${String(f+1).padStart(PAD,'0')}.${EXT}`;
    }
  }));
}
let loopActive = false, loopRAF = 0;
function playLoop(idx){
  const L = LOOPS[idx]; if (!L) return;
  if (!loopReady(L)){ loadLoop(L).then(()=>{ if (current===idx && !loopActive) playLoop(idx); }); return; }
  loopActive = true;
  let t0 = null;
  function step(ts){
    if (!loopActive) return;
    if (t0===null) t0 = ts;
    const p = ((ts - t0) / L.duration) % 1;               // 0..1, loops forever
    const fi = Math.min(L.frames-1, Math.floor(p*L.frames));
    ctx.fillStyle='#000'; ctx.fillRect(0,0,vw,vh);
    paint(L.store[fi] || L.store[0], 1);
    loopRAF = requestAnimationFrame(step);
  }
  loopRAF = requestAnimationFrame(step);
}
function cancelLoop(){ if (!loopActive) return; loopActive=false; cancelAnimationFrame(loopRAF); }

/* ============================================================
   CANVAS DRAW (cover-fit, DPR aware)
============================================================ */
let vw=0, vh=0, dpr=1;
function resize(){
  dpr = Math.min(window.devicePixelRatio||1, 2);
  vw = window.innerWidth; vh = window.innerHeight;
  canvas.width = Math.round(vw*dpr);
  canvas.height = Math.round(vh*dpr);
  canvas.style.width = vw+'px';
  canvas.style.height = vh+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}
window.addEventListener('resize', resize);

function coverRect(img){
  const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
  const ir=iw/ih, vr=vw/vh;
  let w,h;
  if (ir>vr){ h=vh; w=vh*ir; } else { w=vw; h=vw/ir; }
  return { x:(vw-w)/2, y:(vh-h)/2, w, h };
}
function paint(img, alpha){
  if (!img || !img.naturalWidth) return;
  ctx.globalAlpha = alpha;
  const r = coverRect(img);
  ctx.drawImage(img, r.x, r.y, r.w, r.h);
  ctx.globalAlpha = 1;
}

/* ============================================================
   STATE
============================================================ */
let current = 0;            // current section index
let frame = 0;             // current frame within current section (0..FRAMES-1)
let busy = false;          // transition in progress

function draw(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,vw,vh);
  paint(restImg(current), 1);
}

/* ============================================================
   TRANSITION
   - Adjacent step (scroll / neighbouring menu item): a 5s linear camera move
     through that boundary clip (forward going down, reverse going up).
   - Non-adjacent jump (menu to a far room): a "blink" cut (see blinkTo) — no
     fly-through, the room is swapped behind closing black eyelids.
============================================================ */
let pending = null;
function checkPending(){
  if (pending!==null && !busy){
    const d = pending; pending = null; goTo(d);   // goTo re-queues if still not ready
  }
}
function setUI(sec){
  titleEls.forEach((t,k)=> t.classList.toggle('active', k===sec));
  dotEls.forEach((d,k)=> d.classList.toggle('on', k===sec));
  curEl.textContent = '0'+(sec+1);
}

// Blink (eyelid) cut — used for non-adjacent menu jumps: black closes in from
// top & bottom, we swap to the new room while it's black, then it opens.
const BLINK_MS = 560;   // matches the CSS transition (.55s)
function blinkTo(dest){
  busy = true;
  cancelLoop();
  titleEls[current].classList.remove('active');
  blinkEl.classList.add('closed');                 // eyelids close
  setTimeout(()=>{
    current = dest;                                // swap room while black
    setUI(dest);
    draw();
    if (LOOPS[dest]) playLoop(dest);
    blinkEl.classList.remove('closed');            // eyelids open
    setTimeout(()=>{ busy = false; if (!LOOPS[dest]) checkPending(); }, BLINK_MS);
  }, BLINK_MS + 70);
}

function goTo(dest){
  if (busy || dest===current || dest<0 || dest>=SECTIONS.length) return;
  const from = current;
  const down = dest > from;
  const steps = Math.abs(dest - from);

  // non-adjacent jump (menu) -> blink cut instead of flying through the clips
  if (steps > 1){
    const poster = restClip(dest);
    if (loaded[poster] < FRAMES){
      pending = dest;
      if (loaded[poster]===0) loadVideo(poster).then(checkPending);
      return;
    }
    pending = null;
    blinkTo(dest);
    return;
  }

  // ordered legs; `arrive` = the section reached after each leg
  const legs = [];
  if (down){ for (let k=from;   k<dest;  k++) legs.push({ clip:k, reverse:false, arrive:k+1 }); }
  else     { for (let k=from-1; k>=dest; k--) legs.push({ clip:k, reverse:true,  arrive:k   }); }

  const need = [...new Set([...legs.map(l=>l.clip), restClip(dest)])];
  if (need.some(v=> loaded[v] < FRAMES)){            // not ready -> queue, fire when loaded
    pending = dest;
    need.forEach(v=>{ if (loaded[v]===0) loadVideo(v).then(checkPending); });
    return;
  }
  pending = null;
  busy = true;
  cancelLoop();                                     // leaving a looping section, if any
  titleEls[from].classList.remove('active');

  const total = DURATION + (steps-1)*1000;          // +1s per skipped section
  const per = total / steps;
  const railBar = dotEls[dest].querySelector('.bar i');
  let t0 = null, shown = -1;
  function step(ts){
    if (t0===null) t0 = ts;
    const elapsed = ts - t0;
    let i = Math.floor(elapsed / per); if (i >= steps) i = steps-1;
    const lp = Math.min(1, (elapsed - i*per) / per);   // progress within this leg
    const leg = legs[i];
    const fp = leg.reverse ? 1-lp : lp;
    frame = Math.min(FRAMES-1, Math.max(0, Math.round(fp*(FRAMES-1))));

    ctx.fillStyle='#000'; ctx.fillRect(0,0,vw,vh);
    paint(store[leg.clip][frame] || store[leg.clip][0], 1);   // hard frames, no crossfade

    if (railBar) railBar.style.width = (Math.min(1, elapsed/total)*100).toFixed(1)+'%';

    // single step: reveal the destination title as we arrive.
    // multi-section skip: play only the video — no titles until we land.
    if (steps===1 && lp>=0.5 && shown!==leg.arrive){ shown = leg.arrive; setUI(shown); }

    if (elapsed < total){ requestAnimationFrame(step); }
    else {
      current = dest;
      busy = false;
      if (railBar) railBar.style.width='0%';
      setUI(dest);
      draw();
      if (LOOPS[dest] && pending===null) playLoop(dest);   // loop section -> loop
      else checkPending();
    }
  }
  requestAnimationFrame(step);
}

/* ============================================================
   INPUT  (one wheel tick = one section)
============================================================ */
let wheelLock = false;
function onWheel(e){
  e.preventDefault();
  if (Math.abs(e.deltaY) < 4) return;
  if (loopActive){                                  // resting on a looping section
    const target = current + (e.deltaY > 0 ? 1 : -1);
    if (target < 0 || target >= SECTIONS.length) return;   // nowhere to go: keep looping
    cancelLoop();                                   // navigating away: stop the loop
  }
  if (busy || wheelLock) return;
  wheelLock = true;
  setTimeout(()=> wheelLock=false, 220);     // collapse a burst into one tick
  if (e.deltaY > 0) goTo(current+1);
  else goTo(current-1);
}
window.addEventListener('wheel', onWheel, { passive:false });

/* keyboard */
window.addEventListener('keydown', e=>{
  const down = (e.key==='ArrowDown'||e.key==='PageDown'||e.key===' ');
  const up = (e.key==='ArrowUp'||e.key==='PageUp');
  if (!down && !up) return;
  if (loopActive){
    const target = current + (down ? 1 : -1);
    if (target < 0 || target >= SECTIONS.length) return;
    cancelLoop();
  }
  if (busy) return;
  e.preventDefault();
  if (down) goTo(current+1); else goTo(current-1);
});

/* touch */
let touchY=null;
window.addEventListener('touchstart', e=>{ touchY=e.touches[0].clientY; }, {passive:true});
window.addEventListener('touchend', e=>{
  if (touchY===null) return;
  const dy = touchY - e.changedTouches[0].clientY;
  if (Math.abs(dy)<=40){ touchY=null; return; }
  const dir = dy>0 ? 1 : -1;
  if (loopActive){
    const target = current + dir;
    if (target < 0 || target >= SECTIONS.length){ touchY=null; return; }
    cancelLoop();
  }
  if (busy){ touchY=null; return; }
  goTo(current + dir);
  touchY=null;
}, {passive:true});

/* ============================================================
   PRELOAD ORCHESTRATION
============================================================ */
function preloadAll(){
  for (let i=0;i<VIDEOS.length;i++){
    if (loaded[i]===0) loadVideo(i).then(checkPending);
  }
  Object.values(LOOPS).forEach(loadLoop);
}

/* ============================================================
   BOOT
============================================================ */
async function boot(){
  resize();
  // load section 1, drive loader by its progress
  const li = setInterval(()=>{
    const pct = Math.round(loaded[0]/FRAMES*100);
    lbarfill.style.width = pct+'%';
    lpct.textContent = pct+'%';
  }, 60);
  await loadVideo(0);
  clearInterval(li);
  lbarfill.style.width='100%'; lpct.textContent='100%';

  current=0; draw();
  setTimeout(()=> loader.classList.add('hide'), 250);

  // background-load the rest, in parallel. Section 1 rests on its first
  // frame — the clip only plays once the user scrolls.
  preloadAll();
}

boot();
</script>
</body>
</html>
